<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>たなばたリトミック おためしばん</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;background:linear-gradient(#0f172a,#312e81,#581c87);color:white;overflow:hidden;text-align:center;touch-action:manipulation}
#app{width:100vw;height:100vh;position:relative;padding:12px}
h1{margin:6px 0;font-size:26px;letter-spacing:1px}#message{font-size:20px;font-weight:bold;min-height:58px;line-height:1.45;text-shadow:0 3px 8px rgba(0,0,0,.5)}
.miniBtn{position:absolute;right:12px;top:12px;z-index:80;font-size:14px;padding:8px 12px;box-shadow:0 4px 0 #ca8a04}button{font-size:20px;padding:12px 26px;border:none;border-radius:999px;background:#facc15;color:#4c1d95;font-weight:bold;box-shadow:0 6px 0 #ca8a04;cursor:pointer;touch-action:manipulation}button:active{transform:translateY(4px);box-shadow:0 2px 0 #ca8a04}
#stage{position:relative;width:100%;height:64vh;margin-top:8px;border-radius:28px;background:radial-gradient(circle at top,#47556955,#ffffff12);overflow:hidden;border:2px solid rgba(255,255,255,.25)}
.bgstar{position:absolute;animation:twinkle 1.8s infinite alternate;opacity:.7;pointer-events:none}@keyframes twinkle{from{transform:scale(.7);opacity:.25}to{transform:scale(1.25);opacity:1}}
#bamboo{position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:165px;z-index:1;pointer-events:none;filter:drop-shadow(0 8px 10px rgba(0,0,0,.35))}
#ritto{position:absolute;left:10px;bottom:10px;font-size:54px;z-index:5;animation:rittoFloat 2s infinite ease-in-out;pointer-events:none}@keyframes rittoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.item{position:absolute;font-size:48px;cursor:pointer;user-select:none;touch-action:manipulation;z-index:10;animation:float 2s infinite ease-in-out}.item:active{transform:scale(.9)}@keyframes float{0%,100%{translate:0 0}50%{translate:0 -12px}}.pop{animation:pop .45s ease}@keyframes pop{0%{scale:0}70%{scale:1.35}100%{scale:1}}
#rhythmBox{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:15;background:rgba(15,23,42,.28)}#rhythmTitle{font-size:24px;font-weight:bold}.rhythmBtn{width:88px;height:88px;border-radius:50%;font-size:38px;background:white;color:#4c1d95;display:inline-flex;align-items:center;justify-content:center;margin:8px;cursor:pointer;box-shadow:0 6px 0 #c4b5fd;touch-action:manipulation;pointer-events:auto;z-index:30;position:relative}.rhythmBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #c4b5fd}.flash{background:#facc15!important;transform:scale(1.12)}
#ending{display:none;position:absolute;inset:0;background:rgba(15,23,42,.94);z-index:50;align-items:center;justify-content:center;flex-direction:column;padding:18px}#ending .big{font-size:48px;margin:10px}#endingTitle{font-size:28px;font-weight:bold}#cta{font-size:16px;line-height:1.7;background:rgba(255,255,255,.12);border-radius:18px;padding:12px;margin-top:10px}.milky{position:absolute;left:-20%;top:25%;width:140%;height:80px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);filter:blur(12px);transform:rotate(-12deg);animation:river 3s infinite alternate;pointer-events:none}@keyframes river{from{opacity:.35}to{opacity:.9}}
@media(max-width:480px){h1{font-size:23px}#message{font-size:18px}#stage{height:62vh}#bamboo{font-size:140px}.rhythmBtn{width:78px;height:78px;font-size:34px}.item{font-size:44px}}
</style>
</head>
<body>
<div id="app"><h1>🎋 たなばたリトミック</h1><button id="bgmBtn" class="miniBtn">🎵 BGM</button><div id="message">おほしさまを タッチしてね♪</div><button id="startBtn">はじめる</button><div id="stage"><div id="bamboo">🎋</div><div id="ritto">🧚</div><div id="rhythmBox"><div id="rhythmTitle">ひかる じゅんばんで タッチ♪</div><div><span class="rhythmBtn" data-id="0">👏</span><span class="rhythmBtn" data-id="1">⭐</span><span class="rhythmBtn" data-id="2">🙌</span></div></div><div id="ending"><div class="milky"></div><div class="big">🌌</div><div id="endingTitle">たなばた おめでとう！</div><div class="big">👸 ✨ 🤴</div><div>おりひめと ひこぼしが あえたよ♪</div><div id="cta">🌈 おうちで デジタルリトミック<br>⭐ タッチあそび　🎵 リズムあそび<br>🎋 きせつの教材<br>完全版では もっと たくさん あそべるよ♪</div><br><button id="retryBtn">もういちど</button></div></div></div>
<script>
const stage=document.getElementById('stage'),msg=document.getElementById('message'),startBtn=document.getElementById('startBtn'),retryBtn=document.getElementById('retryBtn'),bgmBtn=document.getElementById('bgmBtn');let audioCtx,stars=0,rhythmIndex=0,bgmTimer=null,bgmOn=true;const pattern=[0,1,0,2];

function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function bgmNote(freq,dur=.42,vol=.055){try{ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='triangle';o.frequency.setValueAtTime(freq,audioCtx.currentTime);g.gain.setValueAtTime(0.0001,audioCtx.currentTime);g.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+.04);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur+.02)}catch(e){}}
function startBgm(){
  if(bgmTimer||!bgmOn)return;
  // 七夕風のオリジナルBGM。既存曲のメロディは使わず、和風の五音音階で作っています。
  const notes=[523,659,784,880,784,659,587,523,392,523,587,659,784,659,587,523];
  let i=0;
  bgmTimer=setInterval(()=>{if(!bgmOn)return;bgmNote(notes[i%notes.length],.46,.045); if(i%4===0)bgmNote(notes[(i+7)%notes.length]/2,.7,.025); i++;},520);
}
function stopBgm(){if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null}}

function sound(freq=880,end=1320,time=.25){try{ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(freq,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(end,audioCtx.currentTime+time);g.gain.setValueAtTime(.22,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+time);o.type='sine';o.start();o.stop(audioCtx.currentTime+time)}catch(e){}}
function tap(el,fn){el.addEventListener('pointerdown',e=>{e.preventDefault();fn(e)},{passive:false})}
function bgStars(){for(let i=0;i<36;i++){const s=document.createElement('div');s.className='bgstar';s.textContent='✦';s.style.left=Math.random()*95+'%';s.style.top=Math.random()*78+'%';s.style.fontSize=(13+Math.random()*18)+'px';s.style.animationDelay=Math.random()*2+'s';stage.appendChild(s)}}
function makeStars(){msg.innerHTML='⭐ おほしさまを 5こ あつめよう♪<br>タッチすると おとがなるよ';for(let i=0;i<5;i++){const item=document.createElement('div');item.className='item gameItem';item.textContent='⭐';item.style.left=(12+Math.random()*72)+'%';item.style.top=(10+Math.random()*44)+'%';tap(item,()=>{sound(660,1320,.22);item.style.transition='.6s';item.style.left='50%';item.style.top='52%';item.classList.add('pop');item.style.pointerEvents='none';stars++;msg.textContent=stars<5?`いいね！ あと ${5-stars} こ♪`:'おほしさまが あつまったよ！';if(stars===5)setTimeout(startRhythm,800)});stage.appendChild(item)}}
function startRhythm(){document.querySelectorAll('.gameItem').forEach(e=>e.remove());msg.innerHTML='🎵 リズムあそび<br>ひかった じゅんばんで タッチしてね';document.getElementById('rhythmBox').style.display='flex';rhythmIndex=0;setTimeout(showPattern,600)}
function showPattern(){const btns=document.querySelectorAll('.rhythmBtn');let i=0;const timer=setInterval(()=>{btns.forEach(b=>b.classList.remove('flash'));if(i>=pattern.length){clearInterval(timer);msg.textContent='さあ、まねして タッチ♪';return}btns[pattern[i]].classList.add('flash');sound(520+pattern[i]*180,800+pattern[i]*220,.18);i++},650)}
document.querySelectorAll('.rhythmBtn').forEach(btn=>tap(btn,()=>{const id=Number(btn.dataset.id);sound(500+id*180,900+id*220,.18);if(id===pattern[rhythmIndex]){rhythmIndex++;msg.textContent=`じょうず！ ${rhythmIndex}/${pattern.length}`;if(rhythmIndex===pattern.length)setTimeout(makeDecorations,600)}else{rhythmIndex=0;msg.textContent='もういちど♪ よくみてね';setTimeout(showPattern,900)}}));
function makeDecorations(){document.getElementById('rhythmBox').style.display='none';msg.innerHTML='🎋 かざりを タッチして<br>ささに つけよう♪';const decos=['🎀','💛','🌟','🟦','⭐'];let placed=0;decos.forEach((d,i)=>{const item=document.createElement('div');item.className='item gameItem';item.textContent=d;item.style.left=(7+i*22)+'%';item.style.top='70%';tap(item,()=>{sound(784,1568,.2);item.style.pointerEvents='none';item.style.transition='.55s';item.style.left=(41+Math.random()*19)+'%';item.style.top=(17+Math.random()*38)+'%';item.classList.add('pop');placed++;msg.textContent=placed<5?`きれい！ あと ${5-placed} こ♪`:'ぜんぶ かざれたよ！';if(placed===5)setTimeout(finale,900)});stage.appendChild(item)})}
function finale(){sound(523,1046,.25);setTimeout(()=>sound(659,1318,.25),180);setTimeout(()=>sound(784,1568,.3),360);document.getElementById('ending').style.display='flex'}
tap(startBtn,()=>{startBtn.style.display='none';startBgm();sound(523,1046,.25);bgStars();makeStars()});tap(bgmBtn,()=>{bgmOn=!bgmOn;bgmBtn.textContent=bgmOn?'🎵 BGM':'🔇 BGM';if(bgmOn)startBgm();else stopBgm()});tap(retryBtn,()=>location.reload());
</script>
</body>
</html>
